{% extends 'tuition/base.html' %}
{% load static %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6">
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Edit Subject</h1>
            <p class="text-gray-500">Edit subject: <span class="font-semibold text-brand-600">{{ subject.name }}</span></p>
        </div>
        <a href="{% url 'admin_subjects' subject.class_group.id %}" class="text-sm font-medium text-brand-600 hover:text-brand-500 flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to Subjects
        </a>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <form method="POST" action="{% url 'admin_edit_subject' subject.id %}" class="space-y-6">
            {% csrf_token %}
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Subject Name</label>
                <input type="text" id="name" name="name" value="{{ subject.name }}" required class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-base sm:text-sm px-3 py-3 md:py-2">
            </div>
            
            <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
                <a href="{% url 'admin_subjects' subject.class_group.id %}" class="px-4 py-3 md:py-2 border border-gray-300 rounded-xl shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
                    Cancel
                </a>
                <button type="submit" class="px-6 py-3 md:py-2 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-brand-600 hover:bg-brand-700">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
