{% extends 'tuition/base.html' %}
{% load static %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6">
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Edit Exam</h1>
            <p class="text-gray-500">Update details for {{ exam.name }}</p>
        </div>
        <a href="{% url 'admin_exams' %}" class="text-sm font-medium text-brand-600 hover:text-brand-500 flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to Exams
        </a>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <form method="POST" action="{% url 'admin_edit_exam' exam.id %}" class="space-y-6">
            {% csrf_token %}
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Exam Name</label>
                <input type="text" id="name" name="name" value="{{ exam.name }}" required class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-base sm:text-sm px-3 py-3 md:py-2">
            </div>
            <div>
                <label for="class_id" class="block text-sm font-medium text-gray-700 mb-1">Target Class/Batch</label>
                <select id="class_id" name="class_id" required class="block w-full rounded-lg border-gray-300 shadow-sm text-base sm:text-sm px-3 py-3 md:py-2">
                    {% for cls in classes %}
                        <option value="{{ cls.id }}" {% if exam.class_group.id == cls.id %}selected{% endif %}>{{ cls.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="subject_id" class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
                <select id="subject_id" name="subject_id" class="block w-full rounded-lg border-gray-300 shadow-sm text-base sm:text-sm px-3 py-3 md:py-2">
                    <option value="">General (No Subject)</option>
                    {% for subject in subjects %}
                        <option value="{{ subject.id }}" data-class="{{ subject.class_group.id }}" {% if exam.subject and exam.subject.id == subject.id %}selected{% endif %}>{{ subject.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label for="date" class="block text-sm font-medium text-gray-700 mb-1">Date of Exam</label>
                    <input type="date" id="date" name="date" value="{{ exam.date|date:'Y-m-d' }}" required class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-base sm:text-sm px-3 py-3 md:py-2">
                </div>
                <div>
                    <label for="max_marks" class="block text-sm font-medium text-gray-700 mb-1">Max Marks</label>
                    <input type="number" step="0.01" id="max_marks" name="max_marks" value="{{ exam.max_marks|floatformat:0 }}" required class="block w-full rounded-lg border-gray-300 shadow-sm text-base sm:text-sm px-3 py-3 md:py-2">
                </div>
                <div>
                    <label for="passing_marks" class="block text-sm font-medium text-gray-700 mb-1">Pass Mark</label>
                    <input type="number" step="0.01" id="passing_marks" name="passing_marks" value="{{ exam.passing_marks|floatformat:0 }}" required class="block w-full rounded-lg border-gray-300 shadow-sm text-base sm:text-sm px-3 py-3 md:py-2">
                </div>
            </div>
            
            <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
                <a href="{% url 'admin_exams' %}" class="px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-xl text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500">
                    Cancel
                </a>
                <button type="submit" class="px-6 py-2 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const classSelect = document.getElementById('class_id');
        const subjectSelect = document.getElementById('subject_id');
        
        if (classSelect && subjectSelect) {
            const allOptions = Array.from(subjectSelect.options);
            
            function filterSubjects() {
                const selectedClassId = classSelect.value;
                
                // Keep track of the currently selected option
                const currentSelectedValue = subjectSelect.value;
                
                subjectSelect.innerHTML = '';
                
                allOptions.forEach(opt => {
                    if (opt.value === '' || opt.getAttribute('data-class') === selectedClassId) {
                        // Restore selection if it matches
                        if (opt.value === currentSelectedValue) {
                            opt.selected = true;
                        }
                        subjectSelect.appendChild(opt);
                    }
                });
            }
            
            classSelect.addEventListener('change', filterSubjects);
            filterSubjects();
        }
    });
</script>
{% endblock %}
